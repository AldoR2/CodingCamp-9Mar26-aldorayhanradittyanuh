<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switching Test</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .test-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      z-index: 1000;
    }
    .test-controls button {
      background: var(--accent-color);
      color: var(--text-primary);
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      margin: 0.25rem;
      cursor: pointer;
      font-size: 14px;
    }
    .test-controls button:hover {
      background: var(--hover-color);
    }
  </style>
</head>
<body>
  <div class="test-controls">
    <h3 style="margin-bottom: 0.5rem; color: var(--text-primary);">Theme Test</h3>
    <button onclick="setTheme('light')">Light Theme</button>
    <button onclick="setTheme('dark')">Dark Theme</button>
    <p style="margin-top: 0.5rem; font-size: 12px; color: var(--text-secondary);">
      Current: <span id="current-theme">light</span>
    </p>
  </div>

  <main class="dashboard">
    <!-- Greeting Component -->
    <section id="greeting-section">
      <div id="time-display">12:34:56 PM</div>
      <div id="date-display">Monday, January 1</div>
      <div id="greeting-message">Good Afternoon</div>
      <div id="name-input-container">
        <input id="name-input" type="text" placeholder="Enter your name..." value="Test User">
      </div>
    </section>

    <!-- Focus Timer Component -->
    <section id="timer-section">
      <div id="timer-display">25:00</div>
      <div id="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
    </section>

    <!-- Todo List Component -->
    <section id="todo-section">
      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Add a new task...">
        <button type="submit">Add</button>
      </form>
      <ul id="todo-list">
        <li class="todo-item">
          <input type="checkbox" class="todo-checkbox">
          <span class="todo-text">Sample task 1</span>
          <button class="todo-edit">Edit</button>
          <button class="todo-delete">Delete</button>
        </li>
        <li class="todo-item completed">
          <input type="checkbox" class="todo-checkbox" checked>
          <span class="todo-text">Completed task</span>
          <button class="todo-edit">Edit</button>
          <button class="todo-delete">Delete</button>
        </li>
      </ul>
    </section>

    <!-- Quick Links Component -->
    <section id="links-section">
      <form id="link-form">
        <input id="link-url" type="url" placeholder="URL">
        <input id="link-name" type="text" placeholder="Display name">
        <button type="submit">Add Link</button>
      </form>
      <div id="links-container">
        <div class="link-item">
          <a href="#" class="link-button">Sample Link</a>
          <button class="link-delete">×</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('current-theme').textContent = theme;
      console.log('Theme changed to:', theme);
    }

    // Initialize with light theme
    setTheme('light');
  </script>
</body>
</html>
